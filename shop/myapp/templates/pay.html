{% extends "base.html" %}
{%block title%}Payments{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 border shadow p-3">
            <h2 class="bg-success text-center text-white"> Make Payment</h2>
            <form action="{% url 'pay'%}" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="number" id="phone" name="phone" required class="form-control"><br>
                </div>
                <div class="mb-3">
                <label for="amount" class="form-label">Amount</label>
                <input type="number" id="amount" name="amount" required class="form-control"><br>
                </div>
                <button type="submit" class="btn btn-success">Make Payment</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
